<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍱 大家吃啥 - 訂餐管理系統</title>
    <!-- 引入 Google Fonts 提升排版美感 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=160">
</head>

<body>
    <div class="app-layout">
        <!-- 側邊欄 (電腦版顯示) -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h1>🍱 大家吃啥</h1>
                    <button class="theme-toggle desktop-only" id="theme-toggle-desktop" title="切換深淺模式">🌙</button>
                </div>
                <p>訂餐管理系統</p>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-btn nav-home-btn active">🏠 點餐首頁</button>
                <button class="nav-btn nav-details-btn">📝 查看明細</button>
                <button class="nav-btn nav-person-btn">💸 收錢總帳</button>
                <button class="nav-btn nav-settings-btn">⚙️ 系統設定</button>
            </nav>
            <div class="sidebar-settings-group desktop-only">
                <hr style="border:0; border-top:1px solid var(--border); margin:1rem 0;">
                <div class="sidebar-setting-item">
                    <label><span class="step-badge">1</span>📅 訂餐日期</label>
                    <input type="date" id="order-date" class="date-input">
                </div>
                <div class="sidebar-setting-item">
                    <label>🕐 餐期類型</label>
                    <select id="meal-type" class="meal-type-select-sidebar">
                        <option value="早餐">早餐</option>
                        <option value="午餐" selected>午餐</option>
                        <option value="下午茶">下午茶</option>
                        <option value="晚餐">晚餐</option>
                        <option value="宵夜">宵夜</option>
                    </select>
                </div>
                <div class="sidebar-setting-item">
                    <label>🏢 今日餐廳</label>
                    <select id="restaurant-name" class="restaurant-input">
                        <option value="">請選擇餐廳...</option>
                    </select>
                </div>
                <div class="sidebar-setting-item">
                    <label>⛔ 鎖單時間</label>
                    <div style="display:flex; gap:0.5rem; align-items:center;">
                        <input type="time" id="cutoff-time" value="10:30" class="time-input" style="width:50%;">
                        <button id="confirm-cutoff-btn" class="primary-btn" style="width:50%; padding:0.4rem 0.6rem; font-size:0.8rem;">確定</button>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 投票區 (電腦版將透過 CSS Grid 移至右側；手機版排在點餐單之前) -->
        <div id="voting-section" class="order-form-card hidden voting-sidebar-card">
            <h3
                style="margin-top:0; color:var(--primary); display:flex; justify-content:space-between; align-items:center;">
                <span><span class="step-badge warning">!</span>📊 今日餐廳投票</span>
                <span id="voting-countdown"
                    style="font-size:0.8rem; color:var(--text-muted); font-weight:normal;"></span>
            </h3>
            <div class="form-group">
                <label for="vote-person">投票人 <span class="required">*</span></label>
                <select id="vote-person" required>
                    <option value="" disabled selected>請選擇姓名</option>
                </select>
            </div>
            <div id="voting-options" style="display:flex; flex-direction:column; gap:0.5rem; margin-top:1rem;">
            </div>
            <div id="already-voted-note"
                style="display:none; margin-top:0.75rem; padding:0.5rem 0.75rem; background:var(--input-bg); border-radius:0.5rem; border-left:3px solid var(--success); font-size:0.85rem; color:var(--success);">
            </div>
            <button id="submit-vote-btn" class="primary-btn" style="margin-top:1rem;">🗳️ 確認送出投票</button>
        </div>

        <div class="main-container">
            <!-- 手機版頂部 Header (包含切換按鈕) -->
            <header class="mobile-header">
                <div class="header-top">
                    <button id="theme-toggle-btn" class="theme-toggle">🌙</button>
                    <h1>🍱 訂餐系統</h1>
                    <div style="width: 32px;"></div> <!-- 佔位符以保持標題居中 -->
                </div>
                <div class="mobile-settings-row mobile-only">
                    <div class="mobile-setting-item">
                        <label><span class="step-badge">1</span>📅 日期與餐期</label>
                        <div style="display:flex; gap:0.5rem;">
                            <input type="date" id="order-date-mob" class="date-input">
                            <select id="meal-type-mob" class="meal-type-select">
                                <option value="早餐">早餐</option>
                                <option value="午餐" selected>午餐</option>
                                <option value="下午茶">下午茶</option>
                                <option value="晚餐">晚餐</option>
                                <option value="宵夜">宵夜</option>
                            </select>
                        </div>
                    </div>
                    <div class="mobile-setting-item">
                        <label>🏢 今日餐廳</label>
                        <select id="restaurant-name-mob" class="restaurant-input">
                            <option value="">請選擇餐廳...</option>
                        </select>
                    </div>
                    <div class="mobile-setting-item">
                        <label>⛔ 鎖單時間</label>
                        <div style="display:flex; gap:0.5rem; align-items:center;">
                            <input type="time" id="cutoff-time-mob" value="10:30" class="time-input" style="width:50%;">
                            <button id="confirm-cutoff-mob-btn" class="primary-btn" style="width:50%; padding:0.4rem 0.6rem; font-size:0.8rem;">確定</button>
                        </div>
                    </div>
                </div>
            </header>

            <main>
                <!-- 鎖單警告提示塊 (手機版順序：投票之後) -->
                <div id="locked-warning" class="locked-warning hidden">
                    ⚠️ 本日訂單已過截止時間，狀態已鎖定不開放新增或修改。
                </div>

                <!-- 點餐表單 (手機版順序：最後) -->
                <div class="order-form-card" id="order-form-container">
                    <div class="form-header"
                        style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
                        <h3 style="margin:0;"><span class="step-badge">2</span>📝 填寫訂單</h3>
                        <a id="display-rest-menu" href="#" target="_blank" class="action-btn-mini hidden"
                            style="text-decoration:none; font-size:0.9rem; padding:0.4rem 0.75rem; background:var(--primary); color:white; border-radius:0.5rem;">📄
                            查看菜單</a>
                    </div>

                    <div class="form-group">
                        <label for="person-name">姓名 <span class="required">*</span></label>
                        <select id="person-name" required>
                            <option value="" disabled selected>請選擇您的姓名</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="item-name">餐點名稱 <span class="required">*</span></label>
                        <div id="quick-order-labels" class="quick-label-container"></div>
                        <input type="text" id="item-name" placeholder="例如：排骨便當" list="item-history" required
                            autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="item-price">金額 <span class="required">*</span></label>
                        <div class="price-input-wrapper">
                            <span class="currency-symbol">$</span>
                            <input type="number" id="item-price" placeholder="0" min="0" step="1" required>
                        </div>
                        <div class="quick-prices" id="quick-prices-container"></div>
                    </div>
                    <button id="submit-order-btn" class="primary-btn">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                            fill="none">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                            <polyline points="22 4 12 14.01 9 11.01"></polyline>
                        </svg>
                        送出訂單
                    </button>
                </div>
            </main>
        </div>


        <!-- 懸浮底部導航列 (手機版專用) -->
        <nav class="floating-nav mobile-only">
            <button class="nav-item nav-home-btn active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>點餐</span>
            </button>
            <button class="nav-item nav-details-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="3" y1="9" x2="21" y2="9"></line>
                    <line x1="9" y1="21" x2="9" y2="9"></line>
                </svg>
                <span>明細</span>
            </button>
            <button class="nav-item nav-person-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
                <span>個人</span>
            </button>
            <button class="nav-item nav-settings-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                    </path>
                </svg>
                <span>設定</span>
            </button>
        </nav>
    </div>

    <!-- 歷史清單 DataList (自動完成) -->
    <datalist id="item-history"></datalist>

    <!-- 結算表明細 Modal -->
    <div id="excel-modal" class="modal-overlay hidden">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2>📊 週結算報表中心</h2>
                <div class="header-actions">
                    <button id="clear-history-btn" class="secondary-btn" title="清理過期舊帳"
                        style="color:var(--danger); border-color:var(--locked-border); background:var(--locked-bg);">
                        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2"
                            fill="none">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2">
                            </path>
                        </svg> 清理
                    </button>
                    <button id="export-csv-btn" class="secondary-btn" title="匯出 Excel (CSV)">
                        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2"
                            fill="none">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg> 匯出
                    </button>
                    <button id="close-modal-btn" class="close-btn" aria-label="關閉">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2"
                            fill="none">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- 三大情境頁籤 Tabs -->
            <div class="modal-tabs">
                <button class="tab-btn active" data-tab="tab-details">📝 流水記帳表</button>
                <button class="tab-btn" data-tab="tab-caller">📞 電話叫餐表</button>
                <button class="tab-btn" data-tab="tab-person">💸 收錢總帳表</button>
            </div>

            <div class="modal-body">
                <!-- 預設週導航控制 -->
                <div class="modal-controls">
                    <button id="prev-week-btn" class="week-nav-btn" title="查看上一週">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                            fill="none">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                    </button>
                    <div class="week-label-container">
                        <span id="current-week-label" class="week-date-range">...</span>
                        <button id="current-week-btn" class="week-nav-btn small-btn" title="回到本週">回到本週</button>
                    </div>
                    <button id="next-week-btn" class="week-nav-btn" title="查看下一週">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                            fill="none">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </button>
                </div>

                <!-- JavaScript 將根據 Tab 的狀態把新表格渲染進來 -->
                <div id="dynamic-table-container">
                </div>
            </div>
        </div>
    </div>

    <!-- 系統設定重點 Modal -->
    <div id="settings-modal" class="modal-overlay hidden">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2>⚙️ 系統設定與資料維護</h2>
                <div class="header-actions">
                    <button id="close-settings-btn" class="close-btn" aria-label="關閉">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2"
                            fill="none">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
            </div>
            <!-- 密碼驗證層 -->
            <div id="settings-auth-wrapper" class="modal-body"
                style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem 1.5rem;">
                <div style="font-size: 3rem; margin-bottom: 1rem;">🔒</div>
                <h3 style="margin-bottom: 0.5rem;">請輸入系統密碼</h3>
                <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 1.5rem;">此區域受保護，僅供管理員進入</p>
                <div style="width: 100%; max-width: 300px;">
                    <input type="password" id="settings-password-input" class="restaurant-input" placeholder="預設 1234"
                        style="width: 100%; text-align: center; font-size: 1.25rem; letter-spacing: 0.5rem; margin-bottom: 1rem;">
                    <button id="unlock-settings-btn" class="primary-btn" style="width: 100%;">驗證並解鎖</button>
                    <p id="auth-error-msg"
                        style="color: #ef4444; font-size: 0.85rem; text-align: center; margin-top: 1rem; display: none;">
                        ❌ 密碼錯誤，請再試一次</p>
                </div>
            </div>

            <!-- 實際設定內容 (預設隱藏) -->
            <div id="settings-main-content" style="display: none;">
                <div class="modal-tabs">
                    <button class="settings-tab-btn active" data-tab="tab-users">👥 人員維護</button>
                    <button class="settings-tab-btn" data-tab="tab-restaurants">🏪 便當店維護</button>
                    <button class="settings-tab-btn" data-tab="tab-config">⚙️ 其他設定</button>
                </div>
                <div class="modal-body">
                    <div id="settings-dynamic-content" style="min-height: 300px;"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="sync-loader" class="sync-loader"></div>
    <div id="toast-container" class="toast-container"></div>
    <script src="script.js?v=160"></script>
</body>

</html>
