<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍱 大家吃啥 - 訂餐管理系統</title>
    <!-- 引入 Google Fonts 提升排版美感 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=23">
</head>

<body>
    <div class="container">
        <header>
            <div class="header-top">
                <div class="header-actions-left">
                    <button id="theme-toggle-btn" class="theme-toggle" title="切換深黑/明亮模式">🌙</button>
                </div>
                <h1>🍱 訂餐管理系統</h1>
                <div class="header-actions-right">
                    <button id="settings-btn" class="theme-toggle" title="系統設定與維護">⚙️</button>
                </div>
            </div>
            <p>公司集體訂單、自動總帳、防呆鎖單</p>
            <div class="header-settings">
                <div class="setting-item">
                    <label for="order-date">日期：</label>
                    <input type="date" id="order-date" class="date-input">
                </div>
                <div class="setting-item">
                    <label for="meal-type">餐期：</label>
                    <select id="meal-type" class="meal-type-select">
                        <option value="早餐">早餐</option>
                        <option value="午餐" selected>午餐</option>
                        <option value="下午茶">下午茶</option>
                        <option value="晚餐">晚餐</option>
                        <option value="宵夜">宵夜</option>
                    </select>
                </div>
                <!-- 每日指定餐廳 -->
                <div class="setting-item">
                    <label for="restaurant-name">今日餐廳：</label>
                    <div style="display:flex; align-items:center; gap:0.5rem; flex:1;">
                        <input type="text" id="restaurant-name" placeholder="例如：八方雲集" list="restaurant-history" class="restaurant-input">
                        <span id="restaurant-menu-link-wrapper"></span>
                    </div>
                </div>
                <!-- 每日截止時間 -->
                <div class="setting-item">
                    <label for="cutoff-time" title="超過此時間，主畫面不准再加單與刪單">鎖單時間：</label>
                    <input type="time" id="cutoff-time" value="10:30" class="time-input">
                    <span id="cutoff-display" class="cutoff-display hidden"></span>
                </div>
            </div>
        </header>

        <main>
            <!-- 鎖單警告提示塊 (預設隱藏) -->
            <div id="locked-warning" class="locked-warning hidden">
                ⚠️ 本日訂單已過截止時間，狀態已鎖定不開放新增或修改。
            </div>

            <!-- 投票區 (自動顯示/隱藏) -->
            <div id="voting-section" class="order-form-card hidden" style="margin-bottom: 1.5rem; border: 2px solid var(--primary);">
                <h3 style="margin-top:0; color:var(--primary); display:flex; justify-content:space-between; align-items:center;">
                    <span>📊 今日餐廳投票</span>
                    <span id="voting-countdown" style="font-size:0.9rem; color:var(--text-muted); font-weight:normal;"></span>
                </h3>
                <div class="form-group">
                    <label for="vote-person">投票人 <span class="required">*</span></label>
                    <select id="vote-person" required class="restaurant-input" style="width:100%; border:1px solid var(--border);">
                        <option value="" disabled selected>請選擇您的姓名 (需由管理員新增)</option>
                    </select>
                </div>
                <div id="voting-options" style="display:flex; flex-direction:column; gap:0.5rem; margin-top:1rem;">
                    <!-- 選項將由 JS 產生 -->
                </div>
                <div id="already-voted-note" style="display:none; margin-top:0.75rem; padding:0.5rem 0.75rem; background:var(--input-bg); border-radius:0.5rem; border-left:3px solid var(--success); font-size:0.85rem; color:var(--success);"></div>
                <div style="font-size: 0.85rem; color: var(--text-muted); margin-top: 1rem;">
                    * 每人每個餐期僅可投一票，截止時系統將自動選擇最高票餐廳並鎖定。<br>
                    * 若無人投票或平手，將由第一位點餐者自行決定。
                </div>
                <button id="submit-vote-btn" class="primary-btn" style="margin-top:1rem;">🗳️ 確認送出投票</button>
            </div>

            <div class="order-form-card" id="order-form-container">
                <div class="form-group">
                    <label for="person-name">姓名 <span class="required">*</span></label>
                    <select id="person-name" required class="restaurant-input" style="width:100%; border:1px solid var(--border);">
                        <option value="" disabled selected>請選擇您的姓名</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="item-name">餐點名稱 <span class="required">*</span></label>
                    <input type="text" id="item-name" placeholder="例如：排骨便當" list="item-history" required
                        autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="item-price">金額 <span class="required">*</span></label>
                    <div class="price-input-wrapper">
                        <span class="currency-symbol">$</span>
                        <input type="number" id="item-price" placeholder="0" min="0" step="1" required>
                    </div>
                    <!-- 快選按鈕區塊 -->
                    <div class="quick-prices" id="quick-prices-container"></div>
                </div>
                <button id="submit-order-btn" class="primary-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                    送出訂單
                </button>
            </div>
        </main>

        <footer>
            <div class="summary-card">
                <div class="summary-info">
                    <div class="today-stats">
                        <span class="stat-badge">今日已點：<strong id="today-count-label">0 份</strong></span>
                        <span class="stat-badge">今日消費：<strong id="today-total-label">$0</strong></span>
                    </div>
                    <div class="grand-total-container">
                        <span class="total-caption" style="display:block;font-size:0.9rem;margin-top:0.5rem;font-weight:600;color:var(--text-muted);">本週累積全體總結算</span>
                        <div class="grand-total" id="grand-total">$0</div>
                    </div>
                </div>
                <div class="actions-group" style="display: flex; gap: 0.5rem; flex-direction: column;">
                    <button id="view-excel-btn" class="excel-btn">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                            fill="none">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="3" y1="9" x2="21" y2="9"></line>
                            <line x1="9" y1="21" x2="9" y2="9"></line>
                        </svg>
                        檢視明細表
                    </button>
                    <button id="view-person-btn" class="excel-btn"
                        style="background:var(--success); color:white; border:none; box-shadow:0 4px 6px -1px rgba(16, 185, 129, 0.25);">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                            fill="none">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                        個人週花費總攬
                    </button>
                </div>
            </div>
        </footer>
    </div>

    <!-- 歷史清單 DataList (自動完成) -->
    <datalist id="item-history"></datalist>
    <datalist id="restaurant-history"></datalist>

    <!-- 結算表明細 Modal -->
    <div id="excel-modal" class="modal-overlay hidden">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2>📊 週結算報表中心</h2>
                <div class="header-actions">
                    <button id="clear-history-btn" class="secondary-btn" title="清理過期舊帳" style="color:var(--danger); border-color:var(--locked-border); background:var(--locked-bg);">
                        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg> 清理
                    </button>
                    <button id="export-csv-btn" class="secondary-btn" title="匯出 Excel (CSV)">
                        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2"
                            fill="none">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg> 匯出
                    </button>
                    <button id="close-modal-btn" class="close-btn" aria-label="關閉">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2"
                            fill="none">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- 三大情境頁籤 Tabs -->
            <div class="modal-tabs">
                <button class="tab-btn active" data-tab="tab-details">📝 流水記帳表</button>
                <button class="tab-btn" data-tab="tab-caller">📞 電話叫餐表</button>
                <button class="tab-btn" data-tab="tab-person">💸 收錢總帳表</button>
            </div>

            <div class="modal-body">
                <!-- 預設週導航控制 -->
                <div class="modal-controls">
                    <button id="prev-week-btn" class="week-nav-btn" title="查看上一週">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                            fill="none">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                    </button>
                    <div class="week-label-container">
                        <span id="current-week-label" class="week-date-range">...</span>
                        <button id="current-week-btn" class="week-nav-btn small-btn" title="回到本週">回到本週</button>
                    </div>
                    <button id="next-week-btn" class="week-nav-btn" title="查看下一週">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                            fill="none">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </button>
                </div>

                <!-- JavaScript 將根據 Tab 的狀態把新表格渲染進來 -->
                <div id="dynamic-table-container">
                </div>
            </div>
        </div>
    </div>

    <!-- 系統設定重點 Modal -->
    <div id="settings-modal" class="modal-overlay hidden">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2>⚙️ 系統設定與資料維護</h2>
                <div class="header-actions">
                    <button id="close-settings-btn" class="close-btn" aria-label="關閉">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="modal-tabs">
                <button class="settings-tab-btn active" data-tab="tab-users">👥 人員維護</button>
                <button class="settings-tab-btn" data-tab="tab-restaurants">🏪 便當店維護</button>
                <button class="settings-tab-btn" data-tab="tab-config">⚙️ 其他設定</button>
            </div>
            <div class="modal-body">
                <div id="settings-dynamic-content" style="min-height: 300px;"></div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script src="script.js?v=39"></script>
</body>

</html>
